<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EHS Portal — Design Exploration</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --density: 1;
    --accent: #1F3A8A;
    --font-serif: 'Source Serif 4', Georgia, serif;
    --font-sans: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  html, body, #root { height: 100%; }
  body {
    margin: 0; font-family: var(--font-sans);
    background: #efece5; color: #0B1220;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { transform: translateY(24px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes dotBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }
  @keyframes popIn {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px; z-index: 9999;
    background: #fff; border: 1px solid #E4DFD3;
    border-radius: 10px; padding: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,.12);
    font-family: var(--font-sans); font-size: 12px;
    width: 280px; display: none;
  }
  .tweaks-panel[data-open="true"] { display: block; }
  .tweaks-panel h3 {
    margin: 0 0 12px; font-size: 13px; font-weight: 600;
    letter-spacing: -0.005em; color: #0B1220;
    display: flex; justify-content: space-between; align-items: center;
  }
  .tweaks-panel label {
    display: block; margin-bottom: 4px;
    color: #5A6272; font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
  }
  .tweaks-panel select, .tweaks-panel input[type=text] {
    width: 100%; padding: 7px 10px; border-radius: 4px;
    border: 1px solid #E4DFD3; font-size: 12px;
    font-family: inherit; margin-bottom: 12px;
    background: #FAFAF7;
  }
  .tweaks-panel .swatches {
    display: flex; gap: 6px; margin-bottom: 12px;
  }
  .tweaks-panel .swatch {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: border-color .15s;
  }
  .tweaks-panel .swatch[data-active="true"] { border-color: #0B1220; }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- Tweaks panel -->
  <div class="tweaks-panel" id="tweaks-panel">
    <h3>
      Tweaks
      <span style="font-family: var(--font-mono); font-size: 10px; color: #5A6272; font-weight: 500;">design</span>
    </h3>
    <label>Accent Color</label>
    <div class="swatches" id="tw-swatches"></div>
    <label>Density</label>
    <select id="tw-density">
      <option value="airy">Airy</option>
      <option value="balanced" selected>Balanced</option>
      <option value="dense">Dense</option>
    </select>
    <label>Type Pairing</label>
    <select id="tw-type">
      <option value="serif-sans" selected>Source Serif + Inter + JetBrains Mono</option>
      <option value="serif-only">Source Serif only</option>
      <option value="sans-only">Inter only (strict spec)</option>
      <option value="neue">Newsreader + Geist + Geist Mono</option>
    </select>
  </div>

  <script>
    // React pinned with integrity
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Shared -->
  <script type="text/babel" src="shared/tokens.jsx"></script>
  <script type="text/babel" src="shared/primitives.jsx"></script>
  <script type="text/babel" src="shared/prediction-card.jsx"></script>
  <script type="text/babel" src="shared/inspection-state.jsx"></script>
  <script type="text/babel" src="shared/quiz-overlay.jsx"></script>
  <script type="text/babel" src="shared/chat-page.jsx"></script>
  <!-- Variants -->
  <script type="text/babel" src="variants/inspection-editorial.jsx"></script>
  <script type="text/babel" src="variants/inspection-technical.jsx"></script>
  <script type="text/babel" src="variants/inspection-stacked.jsx"></script>
  <script type="text/babel" src="shared/app.jsx"></script>
  <!-- Canvas -->
  <script type="text/babel" src="design-canvas.jsx"></script>

  <script type="text/babel">
    const { useEffect: uE, useState: uS } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#7A1F36",
      "density": "balanced",
      "typePairing": "serif-sans"
    }/*EDITMODE-END*/;

    const ACCENT_SWATCHES = [
      { label: 'Navy',   color: '#1F3A8A' },
      { label: 'Teal',   color: '#0F6E6E' },
      { label: 'Maroon', color: '#7A1F36' },
      { label: 'Forest', color: '#2F5233' },
      { label: 'Slate',  color: '#334155' },
    ];

    function applyTweaks(t) {
      document.documentElement.style.setProperty('--accent', t.accent);
      // Density affects .density-scale — passed via data-density on root
      document.documentElement.setAttribute('data-density', t.density);

      const fontMap = {
        'serif-sans': {
          serif: "'Source Serif 4', Georgia, serif",
          sans:  "'Inter', system-ui, sans-serif",
          mono:  "'JetBrains Mono', ui-monospace, monospace",
        },
        'serif-only': {
          serif: "'Source Serif 4', Georgia, serif",
          sans:  "'Source Serif 4', Georgia, serif",
          mono:  "'JetBrains Mono', ui-monospace, monospace",
        },
        'sans-only': {
          serif: "'Inter', system-ui, sans-serif",
          sans:  "'Inter', system-ui, sans-serif",
          mono:  "'JetBrains Mono', ui-monospace, monospace",
        },
        'neue': {
          serif: "'Newsreader', Georgia, serif",
          sans:  "'Geist', system-ui, sans-serif",
          mono:  "'Geist Mono', ui-monospace, monospace",
        },
      };
      const f = fontMap[t.typePairing] || fontMap['serif-sans'];
      document.documentElement.style.setProperty('--font-serif', f.serif);
      document.documentElement.style.setProperty('--font-sans', f.sans);
      document.documentElement.style.setProperty('--font-mono', f.mono);

      // Override TOKENS accent live
      if (window.TOKENS) {
        window.TOKENS.editorial.accent = t.accent;
        window.TOKENS.technical.accent = t.accent;
        window.TOKENS.editorial.accentSoft = t.accent + '15';
        window.TOKENS.technical.accentSoft = t.accent + '15';
      }
    }

    // Inject a dynamic style that overrides the inline font specs
    function injectDynamicStyle() {
      const s = document.createElement('style');
      s.id = 'dyn-fonts';
      s.textContent = `
        /* Dynamic font routing so tweak type-pairing actually takes effect */
        [style*="Source Serif 4"] { font-family: var(--font-serif) !important; }
        [style*="Inter"] { font-family: var(--font-sans) !important; }
        [style*="JetBrains Mono"] { font-family: var(--font-mono) !important; }
        /* Newsreader + Geist — loaded on demand */
      `;
      document.head.appendChild(s);
    }
    injectDynamicStyle();

    // Lazy-load fallback font when user picks 'neue'
    function ensureNeueFonts() {
      if (document.getElementById('neue-fonts')) return;
      const link = document.createElement('link');
      link.id = 'neue-fonts';
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap';
      document.head.appendChild(link);
    }

    // Populate swatch UI
    const swatchBar = document.getElementById('tw-swatches');
    ACCENT_SWATCHES.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'swatch';
      btn.style.background = s.color;
      btn.title = s.label;
      btn.dataset.color = s.color;
      btn.onclick = () => {
        TWEAKS.accent = s.color;
        applyTweaks(TWEAKS);
        renderApp();
        syncSwatches();
        persist();
      };
      swatchBar.appendChild(btn);
    });

    let TWEAKS = { ...TWEAK_DEFAULTS };

    function syncSwatches() {
      [...swatchBar.children].forEach(b => {
        b.dataset.active = (b.dataset.color === TWEAKS.accent) ? 'true' : 'false';
      });
    }

    function persist() {
      try {
        window.parent.postMessage({
          type: '__edit_mode_set_keys', edits: { ...TWEAKS }
        }, '*');
      } catch (e) {}
    }

    document.getElementById('tw-density').onchange = (e) => {
      TWEAKS.density = e.target.value;
      applyTweaks(TWEAKS); renderApp(); persist();
    };
    document.getElementById('tw-type').onchange = (e) => {
      TWEAKS.typePairing = e.target.value;
      if (e.target.value === 'neue') ensureNeueFonts();
      applyTweaks(TWEAKS); renderApp(); persist();
    };

    // Edit mode protocol
    window.addEventListener('message', (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') {
        document.getElementById('tweaks-panel').dataset.open = 'true';
      }
      if (e.data.type === '__deactivate_edit_mode') {
        document.getElementById('tweaks-panel').dataset.open = 'false';
      }
    });
    // Register listener first, then announce
    setTimeout(() => {
      try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e) {}
    }, 0);

    // ─── The canvas ───
    function ExplorationPage() {
      return (
        <DesignCanvas>
          <DCSection id="inspection" title="Inspection — three directions"
            subtitle="Same logic, different posture. Pick the posture that fits SUTD's voice.">
            <DCArtboard id="editorial" label="A · Editorial" width={1280} height={900}>
              <EHSApp variant="editorial" />
            </DCArtboard>
            <DCArtboard id="technical" label="B · Technical Pipeline" width={1360} height={900}>
              <EHSApp variant="technical" />
            </DCArtboard>
            <DCArtboard id="stacked" label="C · Inspection Record" width={1040} height={1100}>
              <EHSApp variant="stacked" />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    let root;
    function renderApp() {
      if (!root) root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<ExplorationPage />);
    }

    // Boot
    applyTweaks(TWEAKS);
    syncSwatches();
    renderApp();
  </script>
</body>
</html>
